<h2>Crear cuenta</h2>

<form>

  <table cellpadding="8">

    <tr>
      <td>Nombre completo:</td>
      <td><input type="text" placeholder="Ej: Juan Pérez" size="30"></td>
    </tr>

    <tr>
      <td>Correo electrónico:</td>
      <td><input type="email" placeholder="Ej: juan@gmail.com" size="30"></td>
    </tr>

    <tr>
      <td>Contraseña:</td>
      <td><input type="password" placeholder="Mínimo 8 caracteres" size="30"></td>
    </tr>

    <tr>
      <td>Confirmar contraseña:</td>
      <td><input type="password" placeholder="Repite tu contraseña" size="30"></td>
    </tr>

    <tr>
      <td>Teléfono:</td>
      <td><input type="tel" placeholder="Ej: 999888777" size="30"></td>
    </tr>

    <tr>
      <td>Fecha de nacimiento:</td>
      <td><input type="date"></td>
    </tr>

    <tr>
      <td>Género:</td>
      <td>
        <select>
          <option value="">Seleccionar</option>
          <option>Masculino</option>
          <option>Femenino</option>
          <option>Prefiero no decir</option>
        </select>
      </td>
    </tr>

    <tr>
      <td>Dirección:</td>
      <td><input type="text" placeholder="Ej: Av. Lima 123" size="30"></td>
    </tr>

    <tr>
      <td>Distrito:</td>
      <td>
        <select>
          <option value="">Seleccionar distrito</option>
          <option>Miraflores</option>
          <option>San Isidro</option>
          <option>Surco</option>
          <option>La Molina</option>
          <option>San Borja</option>
        </select>
      </td>
    </tr>

    <tr>
      <td></td>
      <td>
        <input type="checkbox"> Acepto los
        <a href="#">términos y condiciones</a>
      </td>
    </tr>

    <tr>
      <td></td>
      <td>
        <input type="checkbox"> Quiero recibir
        ofertas y promociones
      </td>
    </tr>

    <tr>
      <td></td>
      <td>
        <br>
        <button type="submit">Crear cuenta</button>
        &nbsp;&nbsp;
        <button type="reset">Limpiar</button>
      </td>
    </tr>

  </table>

</form>
